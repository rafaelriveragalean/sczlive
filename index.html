<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SCZ LIVE – Santa Cruz, Bolivia</title>
    <meta name="theme-color" content="#050508">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --v: #8F00FF; --g: #39FF14; --bg: #050508;
            --card: #0e0e14; --border: #1e1e2e; --muted: #3a3a55;
        }
        html, body {
            width: 100%; min-height: 100dvh;
            background: var(--bg); color: #fff;
            font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 32px 24px;
            background-image: radial-gradient(ellipse 80% 40% at 50% 0%, rgba(143,0,255,0.15) 0%, transparent 70%);
        }

        .bolt {
            font-size: 64px;
            filter: drop-shadow(0 0 30px var(--v));
            animation: pop 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
            margin-bottom: 14px;
        }
        h1 {
            font-size: 32px; font-weight: 900;
            letter-spacing: 8px; text-transform: uppercase;
            animation: up 0.6s 0.4s both;
        }
        .sub {
            font-size: 11px; color: var(--muted);
            letter-spacing: 3px; text-transform: uppercase;
            margin-top: 6px; margin-bottom: 48px;
            animation: up 0.6s 0.6s both;
        }

        .cards {
            display: flex; flex-direction: column; gap: 14px;
            width: 100%; max-width: 360px;
            animation: up 0.6s 0.8s both;
        }

        a.card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; padding: 22px 20px;
            text-decoration: none; color: #fff;
            display: flex; align-items: center; gap: 16px;
            transition: border-color 0.25s, transform 0.15s, box-shadow 0.25s;
            -webkit-tap-highlight-color: transparent;
        }
        a.card:active { transform: scale(0.97); }

        a.card.pasajero { border-left: 3px solid var(--v); }
        a.card.pasajero:hover { border-color: var(--v); box-shadow: 0 0 30px rgba(143,0,255,0.15); }

        a.card.conductor { border-left: 3px solid var(--g); }
        a.card.conductor:hover { border-color: var(--g); box-shadow: 0 0 30px rgba(57,255,20,0.1); }

        .card-icon { font-size: 32px; flex-shrink: 0; }
        .card-body { flex: 1; }
        .card-title { font-size: 16px; font-weight: 800; letter-spacing: 1px; }
        .card-desc  { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.5; }
        .card-arrow { font-size: 18px; color: var(--muted); flex-shrink: 0; }

        .footer {
            margin-top: 48px; font-size: 10px; color: #1e1e2e;
            letter-spacing: 2px; text-transform: uppercase;
            animation: up 0.6s 1s both;
        }

        @keyframes pop { from { transform: scale(0.2) rotate(-30deg); opacity:0; } to { transform: scale(1) rotate(0); opacity:1; } }
        @keyframes up  { from { transform: translateY(20px); opacity:0; } to { transform: translateY(0); opacity:1; } }
    </style>
</head>
<body>
    <div class="bolt">⚡</div>
    <h1>SCZ LIVE</h1>
    <p class="sub">Santa Cruz · Bolivia</p>

    <div class="cards">
        <a class="card pasajero" href="/pasajero.html">
            <div class="card-icon">📍</div>
            <div class="card-body">
                <div class="card-title">Soy Pasajero</div>
                <div class="card-desc">Seguí tu micro en tiempo real y sabé cuándo llega</div>
            </div>
            <div class="card-arrow">›</div>
        </a>

        <a class="card conductor" href="/conductor.html">
            <div class="card-icon">🚌</div>
            <div class="card-body">
                <div class="card-title">Soy Conductor</div>
                <div class="card-desc">Iniciá tu turno y transmití tu ubicación en vivo</div>
            </div>
            <div class="card-arrow">›</div>
        </a>
    </div>

    <div class="footer">SCZ LIVE · Todos los derechos reservados</div>
</body>
</html>
